name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          shellcheck \
            experiment-infra/scripts/run-on-vm.sh \
            experiment-infra/scripts/notify-discord.sh \
            experiment-infra/setup.sh \
            experiment-infra/infra/startup-gpu.sh \
            experiment-infra/templates/experiment.sh \
            project-template/experiment.sh

      - name: Install actionlint
        run: |
          curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin actionlint

      - name: Validate GitHub Actions workflows
        run: |
          actionlint \
            .github/workflows/ci.yml \
            experiment-infra/.github/workflows/run-experiment.yml

      - name: Install hadolint
        run: |
          curl -sL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint project-template/Dockerfile.experiment
          hadolint experiment-infra/templates/Dockerfile.experiment

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Validate YAML syntax
        run: |
          yamllint -d relaxed \
            .github/workflows/ci.yml \
            experiment-infra/.github/workflows/run-experiment.yml \
            project-template/.github/workflows/experiment.yml \
            project-template/.github/workflows/experiment-agenttutor.yml \
            project-template/docker-compose.experiment.yml \
            experiment-infra/templates/experiment.yml \
            experiment-infra/templates/experiment-agenttutor.yml \
            experiment-infra/templates/docker-compose.experiment.yml

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiment-infra/infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -diff

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
