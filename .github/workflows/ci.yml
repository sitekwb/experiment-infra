name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          shellcheck \
            experiment-infra/scripts/run-on-vm.sh \
            experiment-infra/scripts/notify-discord.sh \
            experiment-infra/setup.sh \
            experiment-infra/infra/startup-gpu.sh \
            experiment-infra/templates/experiment.sh \
            project-template/experiment.sh

      - name: Install actionlint
        run: bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-bash.sh)

      - name: Validate GitHub Actions workflows
        run: |
          ./actionlint \
            .github/workflows/ci.yml \
            experiment-infra/.github/workflows/run-experiment.yml

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: project-template/Dockerfile.experiment

      - name: Lint Dockerfiles (templates)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: experiment-infra/templates/Dockerfile.experiment

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Validate YAML syntax
        run: |
          yamllint -d relaxed \
            .github/workflows/ci.yml \
            experiment-infra/.github/workflows/run-experiment.yml \
            project-template/.github/workflows/experiment.yml \
            project-template/.github/workflows/experiment-agenttutor.yml \
            project-template/docker-compose.experiment.yml \
            experiment-infra/templates/experiment.yml \
            experiment-infra/templates/experiment-agenttutor.yml \
            experiment-infra/templates/docker-compose.experiment.yml

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiment-infra/infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -diff

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
